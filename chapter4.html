<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chapter 04 | 守护</title>
    <style>
      :root { color-scheme: light; --ink: #1d1d1f; --muted: #6e6e73; --line: #d8d2c8; --paper: #fbfaf7; --accent: #8b5e3c; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100svh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(255, 255, 255, 0.92), rgba(251, 250, 247, 0.88) 46%, rgba(241, 236, 228, 0.88)), var(--paper); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      main { width: min(100%, 680px); padding: 52px 24px 42px; text-align: center; }
      .chapter { margin: 0 0 22px; color: var(--muted); font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(42px, 14vw, 76px); font-weight: 500; line-height: 1.05; letter-spacing: 0; }
      .rule { width: 72px; height: 1px; margin: 34px auto; background: var(--line); }
      .line { margin: 0 auto; max-width: 14em; font-size: clamp(24px, 7vw, 34px); font-weight: 400; line-height: 1.55; letter-spacing: 0; }
      .map { display: block; width: min(100%, 420px); margin: 30px auto 0; border-radius: 14px; box-shadow: 0 18px 44px rgba(90, 74, 56, .18); }
      .section { margin: 42px auto 0; max-width: 18em; }
      .section-title { margin: 0 0 16px; color: var(--muted); font-size: 13px; letter-spacing: .16em; text-transform: uppercase; }
      .poem { margin: 0; font-size: clamp(22px, 6vw, 30px); line-height: 1.75; }
      .peach { width: min(100%, 420px); margin: 30px auto 0; padding: 22px; border: 1px solid rgba(139, 94, 60, .22); border-radius: 14px; background: rgba(255, 250, 242, .66); box-shadow: 0 14px 34px rgba(90, 74, 56, .1); }
      .peach-mark { margin: 0 0 12px; color: var(--accent); font-size: 32px; line-height: 1; }
      .peach-art { display: block; width: 100%; margin: 18px auto 0; border-radius: 10px; }
      .footer { margin-top: 42px; color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <p class="chapter">Chapter 04</p>
      <h1>守护</h1>
      <div class="rule" aria-hidden="true"></div>

      <section class="section" aria-labelledby="border-title">
        <p class="section-title" id="border-title">01 Border</p>
        <p class="poem">我在边境。<br />你在路上。<br />天还没黑，<br />我已经知道有人会来。</p>
      </section>
      <img class="map" src="chapter4-map-illustrated.png?v=2" alt="丹丹从蒙特利尔到美加边境接可可的艺术路线图" />

      <section class="section" aria-labelledby="sick-title">
        <p class="section-title" id="sick-title">02 Sick Day</p>
        <div class="peach">
          <p class="peach-mark">黄桃</p>
          <p class="poem">你承受了<br />我所有的脆弱。<br />在每个苦涩的夜晚，<br />带给我甘甜。</p>
          <img class="peach-art" src="chapter4-peach-care.png" alt="丹丹照顾生病的可可，喂他吃黄桃罐头的温柔插图" />
        </div>
      </section>

      <section class="section" aria-labelledby="moving-title">
        <p class="section-title" id="moving-title">03 Moving</p>
        <p class="poem">箱子很重。<br />夜很长。<br />可是后来，<br />困难也有了同一个方向。</p>
      </section>
      <img class="map" src="chapter4-moving-map.png" alt="丹丹和可可一起搬家的艺术地图" />
      <p class="footer">Keke &amp; Dandan</p>
    </main>
  </body>
</html>
