<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chapter 01 | 相遇</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        --ink: #1d1d1f;
        --muted: #6e6e73;
        --line: #d8d2c8;
        --paper: #fbfaf7;
        --accent: #8b5e3c;
        --green: #5f8f59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.92), rgba(251, 250, 247, 0.88) 46%, rgba(241, 236, 228, 0.88)),
          var(--paper);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      body.story-open {
        display: grid;
        place-items: center;
      }

      body:not(.story-open) {
        overflow: hidden;
      }

      main {
        width: min(100%, 680px);
        padding: 52px 24px 42px;
        text-align: center;
        opacity: 0;
        transform: translateY(12px);
        visibility: hidden;
        transition: opacity 800ms ease, transform 800ms ease, visibility 0s linear 800ms;
      }

      body.story-open main {
        opacity: 1;
        transform: translateY(0);
        visibility: visible;
        transition-delay: 0s;
      }

      .chapter {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 14vw, 76px);
        font-weight: 500;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .rule {
        width: 72px;
        height: 1px;
        margin: 34px auto;
        background: var(--line);
      }

      .line {
        margin: 0 auto;
        max-width: 14em;
        font-size: clamp(24px, 7vw, 34px);
        font-weight: 400;
        line-height: 1.55;
        letter-spacing: 0;
      }

      .photo-pair {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        width: min(100%, 520px);
        margin: 32px auto 0;
      }

      .photo-pair img {
        display: block;
        width: 100%;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        border-radius: 8px;
        box-shadow: 0 14px 34px rgba(90, 74, 56, .14);
      }

      .hint {
        margin: 36px 0 18px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      audio {
        width: min(100%, 420px);
        margin-top: 10px;
        accent-color: var(--accent);
      }

      .footer {
        margin-top: 42px;
        color: var(--muted);
        font-size: 12px;
      }

      .golf-intro {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        border: 0;
        background:
          linear-gradient(180deg, rgba(248, 252, 247, 0.94) 0%, rgba(251, 250, 247, 0.98) 58%, rgba(233, 240, 226, 0.98) 100%),
          var(--paper);
        color: inherit;
        cursor: pointer;
        z-index: 10;
        transition: opacity 700ms ease, visibility 0s linear 700ms;
      }

      .golf-intro.is-done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .intro-inner {
        display: block;
        width: min(100%, 760px);
      }

      .intro-copy {
        display: block;
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .course {
        display: block;
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        min-height: 300px;
      }

      .course-illustration {
        display: block;
        width: 100%;
        height: 100%;
        min-height: inherit;
      }

      .tap-label {
        position: absolute;
        left: 50%;
        bottom: 8%;
        transform: translateX(-50%);
        margin: 0;
        color: rgba(29, 29, 31, 0.72);
        font-size: 16px;
        line-height: 1.5;
        white-space: nowrap;
      }

      .golf-intro.is-playing {
        cursor: default;
      }

      .golf-intro.is-playing .tap-label {
        opacity: 0;
      }

      #club {
        transform: rotate(-28deg);
        transform-origin: 92px 336px;
        transform-box: view-box;
      }

      .golf-intro.is-playing #club {
        animation: swing 980ms cubic-bezier(.32, .02, .18, 1) forwards;
      }

      #flag {
        transform-origin: 694px 306px;
        transform-box: view-box;
      }

      .golf-intro.is-playing #flag {
        animation: flag-wiggle 420ms 2.72s ease-in-out;
      }

      #ball {
        opacity: 0;
      }

      .golf-intro.is-playing #ball {
        opacity: 0;
      }

      @keyframes swing {
        0% { transform: rotate(-28deg); }
        32% { transform: rotate(-64deg); }
        66% { transform: rotate(22deg); }
        100% { transform: rotate(10deg); }
      }

      @keyframes flag-wiggle {
        0%, 100% { transform: rotate(0deg); }
        38% { transform: rotate(4deg); }
        68% { transform: rotate(-3deg); }
      }

      @media (max-width: 560px) {
        .golf-intro {
          padding: 18px;
        }

        .course {
          aspect-ratio: 10 / 13;
          min-height: 440px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        main,
        .golf-intro {
          transition: none;
        }

        .golf-intro.is-playing #club,
        .golf-intro.is-playing #flag {
          animation-duration: 1ms;
        }
      }
    </style>
  </head>
  <body>
    <button class="golf-intro" type="button" aria-label="点击开始 Chapter 01">
      <span class="intro-inner">
        <span class="intro-copy">Chapter 01</span>
        <span class="course" aria-hidden="true">
          <svg class="course-illustration" viewBox="0 0 760 460" role="img">
            <defs>
              <linearGradient id="sky-grad" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#dff0f3" />
                <stop offset=".68" stop-color="#f8fbf3" />
              </linearGradient>
              <linearGradient id="grass-grad" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0" stop-color="#7fb978" />
                <stop offset="1" stop-color="#568d55" />
              </linearGradient>
              <radialGradient id="ball-grad" cx=".34" cy=".28" r=".74">
                <stop offset="0" stop-color="#fff" />
                <stop offset=".48" stop-color="#f5f5f0" />
                <stop offset="1" stop-color="#d4d5ce" />
              </radialGradient>
              <linearGradient id="shaft-grad" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0" stop-color="#565b5c" />
                <stop offset=".48" stop-color="#e6e7e4" />
                <stop offset="1" stop-color="#767a78" />
              </linearGradient>
              <linearGradient id="head-grad" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#f7f4ec" />
                <stop offset=".48" stop-color="#a6a79f" />
                <stop offset="1" stop-color="#5a5b56" />
              </linearGradient>
              <linearGradient id="face-grad" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#fcfaf2" />
                <stop offset=".55" stop-color="#c5c3b8" />
                <stop offset="1" stop-color="#777970" />
              </linearGradient>
              <linearGradient id="grip-grad" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0" stop-color="#161817" />
                <stop offset=".55" stop-color="#454946" />
                <stop offset="1" stop-color="#151716" />
              </linearGradient>
              <path id="ball-path" d="M78 351 C152 346 185 315 250 278 C335 230 398 198 486 224 C573 254 618 304 684 306" />
            </defs>
            <rect width="760" height="460" fill="url(#sky-grad)" />
            <circle cx="122" cy="110" r="46" fill="#fff" opacity=".78" />
            <path d="M0 355 C95 356 149 338 250 278 C335 230 398 198 486 224 C573 254 618 304 760 315 L760 460 L0 460 Z" fill="url(#grass-grad)" />
            <path d="M0 370 C104 365 164 344 257 289 C341 240 398 214 482 239 C565 264 610 314 760 328" fill="none" stroke="#9dcc91" stroke-width="28" stroke-linecap="round" opacity=".72" />
            <ellipse cx="690" cy="313" rx="34" ry="10" fill="#172017" opacity=".96" />
            <g id="flag">
              <line x1="694" y1="306" x2="694" y2="213" stroke="#5b6755" stroke-width="3" stroke-linecap="round" />
              <path d="M696 218 L756 232 L696 252 Z" fill="#c7654d" />
            </g>
            <g id="club">
              <line x1="92" y1="336" x2="150" y2="194" stroke="url(#shaft-grad)" stroke-width="5" stroke-linecap="round" />
              <line x1="95" y1="333" x2="152" y2="195" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity=".62" />
              <line x1="150" y1="194" x2="164" y2="161" stroke="url(#grip-grad)" stroke-width="9" stroke-linecap="round" />
              <line x1="155" y1="190" x2="168" y2="160" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity=".24" />
              <path d="M91 334 C83 344 78 350 68 354" fill="none" stroke="url(#shaft-grad)" stroke-width="8" stroke-linecap="round" />
              <path d="M38 346 C51 342 70 348 85 360 C73 370 51 368 36 358 C30 354 31 349 38 346 Z" fill="url(#head-grad)" stroke="#454844" stroke-width="2" stroke-linejoin="round" />
              <path d="M42 348 C54 348 68 354 80 362 C69 365 53 363 41 356 C35 352 36 349 42 348 Z" fill="url(#face-grad)" stroke="#e9e6dc" stroke-width="1.2" />
              <path d="M45 350 L77 363" stroke="#6e7068" stroke-width="1" opacity=".38" />
              <path d="M48 354 L72 364" stroke="#6e7068" stroke-width="1" opacity=".34" />
              <circle cx="41" cy="351" r="2" fill="#f7f4ec" opacity=".75" />
            </g>
            <g id="static-ball" transform="translate(78 351)">
              <circle r="12" fill="url(#ball-grad)" />
              <circle cx="-4" cy="-3" r="1.3" fill="#c8cac4" opacity=".65" />
              <circle cx="4" cy="2" r="1.2" fill="#c8cac4" opacity=".55" />
              <circle cx="0" cy="6" r="1" fill="#c8cac4" opacity=".5" />
            </g>
            <g id="ball" transform="translate(78 351)">
              <g id="ball-shape">
                <circle r="12" fill="url(#ball-grad)" />
                <circle cx="-4" cy="-3" r="1.3" fill="#c8cac4" opacity=".65" />
                <circle cx="4" cy="2" r="1.2" fill="#c8cac4" opacity=".55" />
                <circle cx="0" cy="6" r="1" fill="#c8cac4" opacity=".5" />
              </g>
            </g>
          </svg>
          <span class="tap-label">丹丹，轻点一下</span>
        </span>
      </span>
    </button>
    <main>
      <p class="chapter">Chapter 01</p>
      <h1>相遇</h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="line">从那一杆开始，<br />两条平行的轨迹有了交点。</p>
      <div class="photo-pair" aria-label="蒙特利尔植物园郁金香花丛中的两张照片">
        <img src="chapter1-dandan-tulips.jpg" alt="丹丹在蒙特利尔植物园郁金香花丛中" />
        <img src="chapter1-keke-tulips.jpg" alt="可可在蒙特利尔植物园郁金香花丛中" />
      </div>
      <p class="hint">把手机音量调大一点，听听这一段回忆。</p>
      <audio controls preload="metadata">
        <source src="chapter1.mp3" type="audio/mpeg" />
        你的浏览器暂时无法播放这段录音。
      </audio>
      <p class="footer">Keke &amp; Dandan</p>
    </main>
    <script>
      const intro = document.querySelector(".golf-intro");
      const ballPath = document.getElementById("ball-path");
      const ball = document.getElementById("ball");
      const ballShape = document.getElementById("ball-shape");
      const pathLength = ballPath.getTotalLength();
      const easeInOut = (t) => t * t * (3 - 2 * t);

      intro.addEventListener("click", () => {
        if (intro.classList.contains("is-playing")) return;
        intro.classList.add("is-playing");

        window.setTimeout(() => {
          const start = performance.now();
          const duration = 2850;

          function roll(now) {
            const elapsed = Math.min((now - start) / duration, 1);
            const progress = easeInOut(elapsed);
            const point = ballPath.getPointAtLength(pathLength * progress);
            const sink = Math.max((elapsed - 0.88) / 0.12, 0);
            const scale = 1 - sink * 0.82;
            const opacity = 1 - sink;

            document.getElementById("static-ball").style.opacity = "0";
            ball.setAttribute("transform", `translate(${point.x} ${point.y + sink * 10})`);
            ball.style.opacity = opacity.toFixed(3);
            ballShape.setAttribute("transform", `rotate(${progress * 980}) scale(${scale})`);

            if (elapsed < 1) requestAnimationFrame(roll);
          }

          requestAnimationFrame(roll);
        }, 560);

        window.setTimeout(() => {
          document.body.classList.add("story-open");
          intro.classList.add("is-done");
        }, 3500);
      });
    </script>
  </body>
</html>
