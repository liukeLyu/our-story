<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chapter 06 | 未来</title>
    <style>
      :root { color-scheme: light; --ink: #1d1d1f; --muted: #6e6e73; --line: #d8d2c8; --paper: #fbfaf7; --accent: #8b5e3c; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100svh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(255, 255, 255, 0.92), rgba(251, 250, 247, 0.88) 46%, rgba(241, 236, 228, 0.88)), var(--paper); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      main { width: min(100%, 680px); padding: 52px 24px 42px; text-align: center; }
      .chapter { margin: 0 0 22px; color: var(--muted); font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(42px, 14vw, 76px); font-weight: 500; line-height: 1.05; letter-spacing: 0; }
      .rule { width: 72px; height: 1px; margin: 34px auto; background: var(--line); }
      .line { margin: 0 auto; max-width: 14em; font-size: clamp(24px, 7vw, 34px); font-weight: 400; line-height: 1.55; letter-spacing: 0; }
      .space { height: 18svh; min-height: 96px; }
      .music { display: none; margin: 34px auto 0; }
      .music.is-ready { display: block; }
      .hint { margin: 0 0 14px; color: var(--muted); font-size: 15px; line-height: 1.7; }
      audio { width: min(100%, 420px); accent-color: var(--accent); }
      .footer { margin-top: 42px; color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <p class="chapter">Chapter 06</p>
      <h1>未来</h1>
      <div class="rule" aria-hidden="true"></div>
      <div class="space" aria-hidden="true"></div>
      <p class="line">这一页，<br />我想当面问你。</p>
      <div class="music" id="music-block">
        <p class="hint">轻点播放，然后抬头。</p>
        <audio id="proposal-music" controls preload="auto">
          <source src="chapter6.mp3" type="audio/mpeg" />
          你的浏览器暂时无法播放这段音乐。
        </audio>
      </div>
      <p class="footer">Keke &amp; Dandan</p>
    </main>
    <script>
      const musicBlock = document.getElementById("music-block");
      const audio = document.getElementById("proposal-music");

      audio.addEventListener("canplay", () => {
        musicBlock.classList.add("is-ready");
        audio.play().catch(() => {
          // Mobile browsers usually require a tap before playing sound.
        });
      }, { once: true });
    </script>
  </body>
</html>
