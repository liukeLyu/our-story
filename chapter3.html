<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chapter 03 | 陪伴</title>
    <style>
      :root { color-scheme: light; --ink: #1d1d1f; --muted: #6e6e73; --line: #d8d2c8; --paper: #fbfaf7; --accent: #8b5e3c; --soft: #e7ddd1; --accent-soft: #c9976b; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100svh; display: grid; place-items: center; background: radial-gradient(circle at top, rgba(255, 255, 255, 0.92), rgba(251, 250, 247, 0.88) 46%, rgba(241, 236, 228, 0.88)), var(--paper); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
      main { width: min(100%, 720px); padding: 52px 24px 42px; text-align: center; }
      .chapter { margin: 0 0 22px; color: var(--muted); font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; }
      h1 { margin: 0; font-size: clamp(42px, 14vw, 76px); font-weight: 500; line-height: 1.05; letter-spacing: 0; }
      .rule { width: 72px; height: 1px; margin: 34px auto; background: var(--line); }
      .line { margin: 0 auto; max-width: 14em; font-size: clamp(24px, 7vw, 34px); font-weight: 400; line-height: 1.55; letter-spacing: 0; }
      .memory { margin-top: 58px; padding-top: 44px; border-top: 1px solid var(--line); }
      .memory .line { max-width: 16em; }
      .chart { width: min(100%, 600px); margin: 36px auto 0; padding: 0 6px; }
      .chart-title { margin: 0 0 18px; color: var(--muted); font-size: 14px; line-height: 1.7; }
      .bars { display: grid; grid-template-columns: repeat(9, minmax(0, 1fr)); align-items: end; gap: clamp(5px, 1.7vw, 12px); height: 220px; padding: 18px 0 8px; border-bottom: 1px solid var(--line); }
      .bar-item { display: grid; grid-template-rows: 22px 1fr 20px; height: 100%; min-width: 0; color: var(--muted); font-size: 11px; }
      .count { align-self: end; margin-bottom: 7px; font-variant-numeric: tabular-nums; transform: rotate(-38deg); transform-origin: center bottom; white-space: nowrap; }
      .bar { align-self: end; width: 100%; min-height: 3px; border-radius: 4px 4px 0 0; background: var(--soft); }
      .met .bar { background: linear-gradient(180deg, var(--accent-soft), var(--accent)); }
      .year { align-self: end; font-variant-numeric: tabular-nums; }
      .met .year, .met .count { color: var(--accent); }
      .chart-note { margin: 14px 0 0; color: var(--accent); font-size: 13px; line-height: 1.6; }
      .hint { margin: 36px 0 18px; color: var(--muted); font-size: 15px; line-height: 1.7; }
      video { width: min(100%, 420px); max-height: 54svh; margin-top: 10px; border-radius: 8px; background: #000; }
      .footer { margin-top: 42px; color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <p class="chapter">Chapter 03</p>
      <h1>陪伴</h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="line">此刻夜晚这么深，<br />你正睡得那么沉。</p>
      <p class="hint">轻点播放，看看这一段回忆。</p>
      <video controls playsinline preload="metadata">
        <source src="chapter3.mov" type="video/quicktime" />
        你的浏览器暂时无法播放这段视频。
      </video>
      <section class="memory" aria-label="照片数量变化">
        <p class="line">直到遇见你，<br />我才想要抓住每一次回忆。</p>
        <div class="chart" aria-label="2018 到 2026 年照片数量柱状图">
          <p class="chart-title">照片数量</p>
          <div class="bars">
            <div class="bar-item">
              <span class="count">13</span>
              <span class="bar" style="height: 1%;"></span>
              <span class="year">2018</span>
            </div>
            <div class="bar-item">
              <span class="count">50</span>
              <span class="bar" style="height: 2%;"></span>
              <span class="year">2019</span>
            </div>
            <div class="bar-item">
              <span class="count">41</span>
              <span class="bar" style="height: 2%;"></span>
              <span class="year">2020</span>
            </div>
            <div class="bar-item">
              <span class="count">238</span>
              <span class="bar" style="height: 10%;"></span>
              <span class="year">2021</span>
            </div>
            <div class="bar-item">
              <span class="count">375</span>
              <span class="bar" style="height: 16%;"></span>
              <span class="year">2022</span>
            </div>
            <div class="bar-item">
              <span class="count">433</span>
              <span class="bar" style="height: 18%;"></span>
              <span class="year">2023</span>
            </div>
            <div class="bar-item met">
              <span class="count">1776</span>
              <span class="bar" style="height: 74%;"></span>
              <span class="year">2024</span>
            </div>
            <div class="bar-item met">
              <span class="count">1682</span>
              <span class="bar" style="height: 70%;"></span>
              <span class="year">2025</span>
            </div>
            <div class="bar-item met">
              <span class="count">2409</span>
              <span class="bar" style="height: 100%;"></span>
              <span class="year">2026</span>
            </div>
          </div>
          <p class="chart-note">2024，遇见丹丹。</p>
        </div>
      </section>
      <p class="footer">Keke &amp; Dandan</p>
    </main>
  </body>
</html>
